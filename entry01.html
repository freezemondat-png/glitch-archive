<!DOCTYPE html>
<html lang="en">
<head>

<!-- =========================
[1] PAGE SETUP / METADATA
========================= -->
<meta charset="UTF-8" />
<title>FACILITY GRID CORE / STRUCTURED SIMULATION</title>

<style>

/* =========================
[2] BASE VISUAL SYSTEM
========================= */

body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* main render surface */
canvas {
  display: block;
}

/* =========================
[3] HUD / UI OVERLAY
========================= */

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  font-family: monospace;
  font-size: 13px;
  color: #00ffd5;
  opacity: 0.85;
  pointer-events: none;
}

#status {
  position: absolute;
  bottom: 10px;
  left: 10px;
  font-family: monospace;
  font-size: 12px;
  color: #ff3b3b;
  opacity: 0.8;
}

</style>

</head>

<body>

<!-- =========================
[4] UI ELEMENTS
========================= -->

<div id="hud">
FACILITY GRID CORE // STRUCTURED SIMULATION<br>
ENTITY: NORTH — STABLE PRESENCE MODEL<br>
NODE SYSTEM: ACTIVE
</div>

<div id="status">BOOT SEQUENCE INITIATED...</div>

<!-- =========================
[5] THREE.JS ENGINE IMPORT
========================= -->

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

<!-- =========================
[6] GLOBAL VARIABLES
========================= -->

let scene, camera, renderer;
let north;
let nodes = [];
let activeNode = 0;
let tick = 0;

<!-- =========================
[7] INITIALIZATION
========================= -->

init();
animate();

function init(){

  <!-- =========================
  [7.1] SCENE SETUP
  ========================= -->
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.055);

  <!-- =========================
  [7.2] CAMERA SETUP
  ========================= -->
  camera = new THREE.PerspectiveCamera(
    70,
    innerWidth / innerHeight,
    0.1,
    100
  );

  camera.position.set(0, 1.6, 6);

  <!-- =========================
  [7.3] RENDERER SETUP
  ========================= -->
  renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  <!-- =========================
  [7.4] LIGHTING SYSTEM
  ========================= -->
  const light = new THREE.PointLight(0x66ffee, 1.2, 25);
  light.position.set(2, 5, 3);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0x111111));

  <!-- =========================
  [7.5] NORTH ENTITY (STABLE MODEL)
  ========================= -->
  north = new THREE.Mesh(
    new THREE.ConeGeometry(0.65, 2.4, 12),
    new THREE.MeshStandardMaterial({
      color: 0x000000,
      roughness: 1,
      metalness: 0
    })
  );

  north.rotation.x = Math.PI;
  north.position.set(0, 0.6, 0);
  scene.add(north);

  <!-- =========================
  [7.6] FACILITY NODE SYSTEM
  ========================= -->
  createNodes();

  <!-- =========================
  [7.7] NODE SWITCH TIMER
  ========================= -->
  setInterval(switchNode, 6500);

  window.addEventListener("resize", onResize);

  document.getElementById("status").innerText =
    "SYSTEM ONLINE // SIMULATION ACTIVE";
}

<!-- =========================
[8] NODE CREATION SYSTEM
========================= -->

function createNodes(){

  for(let i = 0; i < 3; i++){

    const group = new THREE.Group();

    // collapsed pillar structure
    const pillar = new THREE.Mesh(
      new THREE.BoxGeometry(1.3, 4.2, 1.3),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a })
    );

    pillar.position.set((i - 1) * 2.2, 1, 0);
    group.add(pillar);

    // rubble base
    const rubble = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.35, 2),
      new THREE.MeshStandardMaterial({ color: 0x101010 })
    );

    rubble.position.set((i - 1) * 2.2, -1, 0);
    group.add(rubble);

    group.visible = i === 0;

    scene.add(group);
    nodes.push(group);
  }
}

<!-- =========================
[9] NODE SWITCH SYSTEM
========================= -->

function switchNode(){

  nodes[activeNode].visible = false;

  activeNode = (activeNode + 1) % nodes.length;

  nodes[activeNode].visible = true;

  document.getElementById("status").innerText =
    `NODE ACTIVE → ${activeNode === 0 ? "17" : activeNode === 1 ? "09" : "03"}`;
}

<!-- =========================
[10] NORTH ENTITY BEHAVIOR
(STABLE / CANON-CONSISTENT)
========================= -->

function updateNorth(){

  // idle mechanical hover
  north.position.y = 0.6 + Math.sin(tick * 0.01) * 0.03;

  // servo drift rotation
  north.rotation.z = Math.sin(tick * 0.005) * 0.02;

  // slow mechanical spin
  north.rotation.y += 0.002;
}

<!-- =========================
[11] SYSTEM SIMULATION LAYER
========================= -->

function systemDrift(){

  camera.position.x += Math.sin(tick * 0.002) * 0.0005;
  camera.position.y += Math.cos(tick * 0.003) * 0.0003;

}

<!-- =========================
[12] MAIN LOOP
========================= -->

function animate(){

  requestAnimationFrame(animate);

  tick++;

  updateNorth();
  systemDrift();

  renderer.render(scene, camera);
}

<!-- =========================
[13] RESIZE HANDLER
========================= -->

function onResize(){

  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(innerWidth, innerHeight);
}

</script>

</body>
</html>
