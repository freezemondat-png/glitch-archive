<html>
<head>
<title>ENTRY 01 // SECURITY FEED</title>

<style>
body {
    background:#0b0f14;

.feed {
    position:relative;

<body>

<h2>SEC_FEED://07:13:ΔΔ</h2>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FACILITY NODE FEED / SECTOR 17</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
  }

  video, canvas {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
  }

  canvas {
    pointer-events: none;
  }

  /* scanline + CRT distortion */
  .crt::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.05),
      rgba(0,0,0,0.05) 1px,
      rgba(0,0,0,0.15) 2px
    );
    mix-blend-mode: overlay;
    pointer-events: none;
  }

  .crt::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    box-shadow: inset 0 0 200px rgba(0,0,0,0.8);
    pointer-events: none;
  }
</style>
</head>

<body class="crt">

<video id="cam" autoplay playsinline></video>
<canvas id="screen"></canvas>

<script>
const cam = document.getElementById("cam");
const screen = document.getElementById("screen");
const ctx = screen.getContext("2d");

function resize(){
  screen.width = innerWidth;
  screen.height = innerHeight;
}
addEventListener("resize", resize);
resize();

// CAMERA INPUT
navigator.mediaDevices.getUserMedia({ video: true })
.then(s => cam.srcObject = s)
.catch(() => console.log("NO FEED / FALLBACK MODE"));

// SYSTEM STATE
let t = 0;
let corruption = 0;

// ---------- POST PROCESS ----------
function applyNoise(intensity = 15) {
  const img = ctx.getImageData(0,0,screen.width,screen.height);
  const d = img.data;

  for(let i=0;i<d.length;i+=4){
    const n = (Math.random()-0.5)*intensity;
    d[i] += n;
    d[i+1] += n;
    d[i+2] += n;
  }
  ctx.putImageData(img,0,0);
}

function scanJitter(){
  const offset = Math.sin(t*0.02)*2;
  ctx.drawImage(screen, offset, 0);
}

// ---------- ENVIRONMENT ----------
function drawPillar(){
  ctx.fillStyle = "#1b1b1b";

  // main collapsed structure
  ctx.fillRect(screen.width*0.62, screen.height*0.12, 160, screen.height*0.8);

  // debris shading
  ctx.fillStyle = "#111";
  ctx.beginPath();
  ctx.moveTo(screen.width*0.55, screen.height*0.92);
  ctx.lineTo(screen.width*0.78, screen.height*0.80);
  ctx.lineTo(screen.width*0.85, screen.height);
  ctx.lineTo(screen.width*0.50, screen.height);
  ctx.closePath();
  ctx.fill();
}

// ---------- ENTITY RENDER (high fidelity silhouette) ----------
function drawEntity(x,y){

  // subtle “material depth”
  const flicker = 0.9 + Math.sin(t*0.1)*0.05;

  ctx.fillStyle = `rgba(0,0,0,${flicker})`;

  // HEAD (angular, drone-like visor geometry)
  ctx.beginPath();
  ctx.moveTo(x, y-150);
  ctx.lineTo(x+35, y-120);
  ctx.lineTo(x+18, y-80);
  ctx.lineTo(x-18, y-80);
  ctx.lineTo(x-35, y-120);
  ctx.closePath();
  ctx.fill();

  // CORE BODY (mechanical chassis)
  ctx.fillRect(x-22, y-80, 44, 120);

  // ARM SYSTEMS (asymmetric = more realistic mechanical feel)
  const sway = Math.sin(t*0.03)*3;

  ctx.beginPath();
  ctx.moveTo(x-22, y-60);
  ctx.lineTo(x-95+sway, y-5);
  ctx.lineTo(x-70, y+25);
  ctx.lineTo(x-12, y-35);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x+22, y-60);
  ctx.lineTo(x+95-sway, y-5);
  ctx.lineTo(x+70, y+25);
  ctx.lineTo(x+12, y-35);
  ctx.closePath();
  ctx.fill();

  // LEGS (partially embedded — not floating)
  ctx.fillRect(x-18, y+30, 16, 100);
  ctx.fillRect(x+2, y+30, 16, 100);
}

// ---------- HUD ----------
function drawHUD(){
  ctx.fillStyle = "rgba(0,255,200,0.75)";
  ctx.font = "13px monospace";

  ctx.fillText("FACILITY NODE // SECTOR 17-B", 20, 30);
  ctx.fillText("CAM STATUS: DEGRADED / INTERMITTENT LOSS", 20, 50);
  ctx.fillText("ANOMALY DETECTED: BIO-MECHANICAL SIGNATURE", 20, 70);

  const time = new Date().toISOString().split("T")[1].split(".")[0];
  ctx.fillText("SYNC TIME: " + time, 20, 100);

  // warning pulse
  if(Math.random() < 0.03){
    ctx.fillStyle = "rgba(255,0,0,0.25)";
    ctx.fillRect(0,0,screen.width,screen.height);
  }
}

// ---------- CORRUPTION EVENTS (IMPORTANT FEELING LAYER) ----------
function solverDistortion(){
  if(Math.random() < 0.02){
    corruption = 10;

    // horizontal frame tear
    const sliceY = Math.random()*screen.height;
    const sliceH = 20;

    const img = ctx.getImageData(0,sliceY,screen.width,sliceH);
    ctx.putImageData(img, Math.random()*10-5, sliceY);
  }

  if(corruption > 0){
    applyNoise(8);
    corruption--;
  }
}

// ---------- MAIN LOOP ----------
function loop(){
  t++;

  ctx.drawImage(cam, 0, 0, screen.width, screen.height);

  // entity placement (slight organic instability)
  const x = screen.width*0.64 + Math.sin(t*0.01)*2;
  const y = screen.height*0.55 + Math.cos(t*0.012)*2;

  drawEntity(x,y);
  drawPillar();
  drawHUD();

  solverDistortion();

  // scan jitter (camera instability)
  if(Math.random() < 0.1) scanJitter();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
    
</html>

    <div class="overlay top">SIGNAL UNSTABLE</div>

    <img src="frame01.png">

    <div class="overlay bottom">VISUAL DATA CORRUPTED</div>

</div>

<script>
let t = localStorage.getItem("corruption") || 0;
t++;
localStorage.setItem("corruption", t);
</script>

</body>
</html>
