<!DOCTYPE html>
<html>
<head>
<title>ENTRY 03 // FULL HEAT</title>

<style>
body {
    margin:0;
    background:#070a0f;
    color:#cfd3d8;
    font-family: monospace;
}

.container {
    padding:40px;
    max-width:900px;
    margin:auto;
}

.glitch {
    color:#ff3b3b;
    animation: shake 0.2s infinite;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    50% { transform: translate(1px,-1px); }
    100% { transform: translate(0,0); }
}

.box {
    border:1px solid #2a2f36;
    padding:20px;
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h1 class="glitch">ENTRY 03 // FULL HEAT</h1>

<div class="box">
SYSTEM OVERLOAD DETECTED
</div>

<div class="box">
> memory fragmentation accelerating  
> anchor links failing  
> identity collapse imminent
</div>

</div>
<script>
let t = parseInt(localStorage.getItem("t") || "0");
t++;
localStorage.setItem("t", t);

// Base corruption effects
window.onload = function() {

    if (t > 2) {
        document.body.style.filter = "contrast(1.1) brightness(0.95)";
    }

    if (t > 4) {
        document.body.style.filter = "contrast(1.2) brightness(0.9) hue-rotate(5deg)";
    }

    if (t > 6) {
        document.body.style.filter = "contrast(1.3) brightness(0.8) hue-rotate(15deg)";
    }

    if (t > 8) {
        document.body.innerHTML += `
        <div style="color:#ff3b3b; position:fixed; bottom:10px; left:10px; font-family:monospace;">
            SYSTEM CORRUPTION SPREADING
        </div>`;
    }
};
</script>
</body>
</html>
